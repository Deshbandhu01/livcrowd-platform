spring:
  datasource:
    url: jdbc:h2:mem:livcrowd;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Keep standard security/jwt/crowd configs 
livcrowd:
  jwt:
    secret: ${JWT_SECRET:8a92fbd850a9b895fd8216fc1bffd8449c2889eb6e21ab1713e51241154c15da}
    expiry-ms: 86400000
  crowd:
    snapshot-interval-sec: 30
    smoothing-alpha: 0.4
